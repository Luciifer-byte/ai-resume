name: Render CV

permissions:
  contents: write

on:
  push:
    paths:
      - 'cv.yaml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install RenderCV
        run: pip install --no-cache-dir "rendercv[full]==2.8"

      - name: Render CV
        run: rendercv render cv.yaml

      - name: Commit rendered PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rendercv_output/*.pdf -f
          git diff --staged --quiet || git commit -m "Auto-render CV PDF [skip ci]"
          git pull --rebase origin main
          git push
